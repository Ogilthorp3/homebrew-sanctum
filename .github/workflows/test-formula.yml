name: Test Formula

# Real end-to-end test of the formula on a clean macOS runner: brew
# downloads the release tarball, verifies its sha256, builds the venv,
# pip-installs the package, symlinks the binary — then we smoke-test it.
# This is the install path a beta user actually takes.

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  install:
    runs-on: macos-latest
    env:
      HOMEBREW_NO_ANALYTICS: "1"
      HOMEBREW_NO_INSTALL_CLEANUP: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Stage this checkout as a tap (so the branch's formula is what installs)
        run: |
          set -euxo pipefail
          brew tap-new ogilthorp3/sanctum --no-git
          cp ./Formula/sanctum-cli.rb "$(brew --repository ogilthorp3/sanctum)/Formula/sanctum-cli.rb"

      - name: Brew install the formula (downloads tarball, checks sha256, builds venv)
        run: brew install ogilthorp3/sanctum/sanctum-cli

      - name: Smoke test the installed binary
        run: |
          set -euxo pipefail
          sanctum --version
          sanctum --help >/dev/null
          # First-run UX in a clean HOME with no ~/.sanctum.
          export HOME="$RUNNER_TEMP/clean-home"
          mkdir -p "$HOME"
          sanctum init --name ci --yes
          sanctum status
          # A haus-gated command must show the haus banner (on stderr) and exit 0.
          out="$(sanctum council "hi" 2>&1)"
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -qi "full Sanctum haus"

      - name: brew test (runs the formula's test block)
        run: brew test ogilthorp3/sanctum/sanctum-cli

      - name: brew audit (informational)
        run: brew audit ogilthorp3/sanctum/sanctum-cli || true
